{% extends "admin/base.html" %}
{% block title %}{{ 'Editare' if lot else 'Adaugă' }} Parcare — Admin ParkSide{% endblock %}
{% block page_title %}{{ 'Editare Parcare' if lot else 'Adaugă Parcare Nouă' }}{% endblock %}
{% block content %}

<div class="max-w-2xl">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nume Parcare</label>
                    <input type="text" name="name" required value="{{ lot.name if lot else '' }}"
                           placeholder="ex: ParkSide Central"
                           class="w-full border border-gray-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Adresă</label>
                    <input type="text" name="address" required value="{{ lot.address if lot else '' }}"
                           placeholder="ex: Strada Mihai Eminescu 12"
                           class="w-full border border-gray-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Oraș</label>
                    <input type="text" name="city" required value="{{ lot.city if lot else '' }}"
                           placeholder="ex: București"
                           class="w-full border border-gray-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Preț per Oră (EUR)</label>
                    <input type="number" name="price_per_hour" step="0.5" min="0" required
                           value="{{ lot.price_per_hour if lot else '' }}" placeholder="ex: 5.0"
                           class="w-full border border-gray-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Total Locuri</label>
                    <input type="number" name="total_spots" min="1" required
                           value="{{ lot.total_spots if lot else '' }}" placeholder="ex: 50"
                           class="w-full border border-gray-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700">
                </div>

                {% if lot %}
                <div class="flex items-center gap-3 pt-6">
                    <input type="checkbox" name="is_active" id="is_active" {% if lot.is_active %}checked{% endif %}
                           class="w-4 h-4 text-blue-600 rounded border-gray-300">
                    <label for="is_active" class="text-sm font-semibold text-gray-700">Parcare activă (vizibilă utilizatorilor)</label>
                </div>
                {% endif %}

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Descriere</label>
                    <textarea name="description" rows="3" placeholder="Scurtă descriere a parcării..."
                              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700 resize-none">{{ lot.description if lot else '' }}</textarea>
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700 transition font-semibold text-sm">
                    <i class="fas fa-save mr-1.5"></i>{{ 'Salvează Modificările' if lot else 'Adaugă Parcare' }}
                </button>
                <a href="/admin/parkings" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-xl hover:bg-gray-200 transition text-sm font-semibold">
                    Anulează
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
